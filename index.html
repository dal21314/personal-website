<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>David Lynch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    color: var(--ink);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 16px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    background: var(--grey-bg);
    transition: background 0.25s ease;
  }

  ::selection { background: var(--accent); color: #1a1300; }

  .page {
    max-width: 1040px;
    margin: 0 auto;
    padding: clamp(28px, 5vw, 64px) clamp(20px, 4vw, 40px) 80px;
  }

  /* --- Top meta bar ------------------------------------------------- */
  .meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-quiet);
    padding-bottom: 28px;
    border-bottom: 1px solid var(--grey-line);
  }
  .meta .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent);
    display: inline-block;
    margin-right: 8px;
    vertical-align: middle;
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent);
  }

  /* --- Hero --------------------------------------------------------- */
  .hero {
    padding: 56px 0 48px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 40px;
    align-items: end;
  }
  .hero h1 {
    font-family: var(--serif);
    font-weight: 400;
    font-size: clamp(44px, 7vw, 84px);
    line-height: 0.98;
    letter-spacing: -0.025em;
    margin: 0 0 18px;
    color: var(--ink);
  }
  .hero h1 em {
    font-style: italic;
    color: var(--accent);
    font-weight: 400;
  }
  .hero .lede {
    font-size: clamp(17px, 1.6vw, 19px);
    color: var(--ink-dim);
    max-width: 46ch;
    margin: 0;
    line-height: 1.5;
  }
  .hero .tagline {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-quiet);
    margin: 0 0 22px;
  }
  .hero .tagline span { color: var(--accent); }

  /* --- Hero CTA ----------------------------------------------------- */
  .hero-cta {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 28px;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 18px;
    border-radius: 10px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 500;
    text-decoration: none;
    letter-spacing: -0.005em;
    transition: transform 0.15s ease, background 0.15s, border-color 0.15s, color 0.15s;
    white-space: nowrap;
  }
  .btn b {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 3px 7px;
    border-radius: 999px;
    margin-left: 2px;
  }
  .btn .arrow {
    display: inline-block;
    transition: transform 0.2s ease;
    opacity: 0.6;
  }
  .btn:hover .arrow { transform: translate(2px, -2px); opacity: 1; }

  .btn-primary {
    background: var(--accent);
    color: #1a1300;
    border: 1px solid var(--accent);
  }
  .btn-primary b {
    background: rgba(0,0,0,0.14);
    color: #1a1300;
  }
  .btn-primary:hover {
    background: color-mix(in srgb, var(--accent) 88%, white);
  }

  .btn-secondary {
    background: var(--navy);
    color: var(--ink);
    border: 1px solid var(--navy-line);
  }
  .btn-secondary b {
    background: rgba(255,255,255,0.06);
    color: var(--ink-dim);
  }
  .btn-secondary:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .btn-secondary:hover b { color: var(--accent); }

  .hero-aside {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-quiet);
    text-align: right;
    line-height: 1.8;
  }
  .hero-aside b {
    color: var(--ink-dim);
    font-weight: 500;
    display: block;
  }

  /* --- Section label ------------------------------------------------ */
  .section-label {
    display: flex;
    align-items: center;
    gap: 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-quiet);
    margin: 56px 0 18px;
  }
  .section-label .num { color: var(--accent-quiet); }
  .section-label .rule { flex: 1; height: 1px; background: var(--grey-line); }

  /* --- Card --------------------------------------------------------- */
  .card {
    background: var(--navy);
    border: 1px solid var(--navy-line);
    border-radius: var(--radius);
    padding: var(--pad);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.04) inset,
      0 20px 40px -24px rgba(0,0,0,0.55);
    transition: background 0.25s ease, border-color 0.25s ease;
  }
  /* Only stack spacing for cards directly following another card in block flow */
  main > .card + .card,
  .page > .card + .card { margin-top: 18px; }

  /* --- About -------------------------------------------------------- */
  .about {
    display: grid;
    grid-template-columns: 1.7fr 1fr;
    gap: clamp(24px, 3vw, 44px);
    align-items: start;
  }
  .about p {
    font-size: 17px;
    line-height: 1.65;
    color: var(--ink);
    margin: 0 0 16px;
    text-wrap: pretty;
  }
  .about p:last-child { margin-bottom: 0; }
  .about p em {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 400;
    color: var(--accent);
  }

  .creds {
    border-left: 1px solid var(--navy-line);
    padding-left: clamp(20px, 2vw, 28px);
  }
  .creds h4 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-quiet);
    margin: 0 0 14px;
    font-weight: 500;
  }
  .creds ul { list-style: none; margin: 0; padding: 0; }
  .creds li {
    font-size: 14px;
    color: var(--ink-dim);
    padding: 9px 0;
    border-bottom: 1px dashed rgba(255,255,255,0.06);
    display: flex;
    justify-content: space-between;
    gap: 12px;
  }
  .creds li:last-child { border-bottom: 0; }
  .creds li span {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-quiet);
    letter-spacing: 0.06em;
  }

  /* --- Companies grid ---------------------------------------------- */
  .companies {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
    align-items: stretch;             /* stretch children to row height */
  }
  .company {
    display: flex;
    flex-direction: column;
    height: 100%;                      /* fill the grid row */
  }
  .company-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--navy-line);
    margin-bottom: 18px;
  }
  .company-head .logo {
    font-family: var(--serif);
    font-size: 28px;
    font-weight: 500;
    letter-spacing: -0.02em;
    line-height: 1;
    color: var(--ink);
  }
  .company-head .logo .mark {
    color: var(--accent);
    font-style: italic;
  }
  .company-head .role {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-quiet);
    text-align: right;
    line-height: 1.6;
  }
  .company-head .role b {
    display: block;
    color: var(--ink-dim);
    font-weight: 500;
  }

  .company-desc {
    font-size: 14.5px;
    line-height: 1.6;
    color: var(--ink-dim);
    margin: 0 0 18px;
    text-wrap: pretty;
    flex: 1;                           /* pushes products/footer to bottom */
  }
  .company-desc strong { color: var(--ink); font-weight: 500; }

  .products {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 18px;
    min-height: 56px;           /* reserve room for 2 rows so both cards align */
    align-content: flex-start;
  }
  .pill {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.06em;
    padding: 5px 9px;
    border: 1px solid var(--navy-line);
    border-radius: 999px;
    color: var(--ink-dim);
    background: rgba(255,255,255,0.02);
  }

  .company-foot {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 18px;
    border-top: 1px solid var(--navy-line);
    margin-top: auto;                  /* pin to bottom regardless of text */
  }
  .company-foot a {
    color: var(--ink);
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: color 0.15s;
  }
  .company-foot a:hover { color: var(--accent); }
  .company-foot a .arrow { display: inline-block; transition: transform 0.2s; }
  .company-foot a:hover .arrow { transform: translate(2px, -2px); }
  .company-foot .email {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-quiet);
    text-decoration: none;
    letter-spacing: 0.02em;
  }
  .company-foot .email:hover { color: var(--ink-dim); }

  /* --- Contact cards (per-company, side by side) -------------------- */
  .contact-card {
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .contact-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--navy-line);
  }
  .contact-head .logo {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.02em;
    line-height: 1;
    color: var(--ink);
  }
  .contact-head .logo .mark { color: var(--accent); font-style: italic; }
  .contact-head .role {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-quiet);
    text-align: right;
    line-height: 1.6;
  }
  .contact-head .role b {
    display: block;
    color: var(--ink-dim);
    font-weight: 500;
  }

  /* --- Contact ------------------------------------------------------ */
  .contact {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 24px 32px;
    align-items: baseline;
  }
  .contact dt {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-quiet);
  }
  .contact dd {
    margin: 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: var(--ink);
  }
  .contact dd a {
    color: var(--ink);
    text-decoration: none;
    border-bottom: 1px solid var(--navy-line);
    transition: border-color 0.15s, color 0.15s;
    padding-bottom: 1px;
  }
  .contact dd a:hover { color: var(--accent); border-color: var(--accent); }

  /* --- Footer ------------------------------------------------------- */
  footer.site {
    margin-top: 64px;
    padding-top: 24px;
    border-top: 1px solid var(--grey-line);
    display: flex;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-quiet);
  }

  /* --- Density modifiers ------------------------------------------- */
  body.density-compact { --pad: clamp(16px, 2.4vw, 24px); --radius: 10px; }
  body.density-comfy   { --pad: clamp(26px, 4vw, 48px);  --radius: 18px; }

  /* --- Responsive --------------------------------------------------- */
  @media (max-width: 760px) {
    .hero { grid-template-columns: 1fr; gap: 24px; }
    .hero-aside { text-align: left; }
    .about { grid-template-columns: 1fr; gap: 28px; }
    .creds {
      border-left: 0;
      border-top: 1px solid var(--navy-line);
      padding-left: 0;
      padding-top: 22px;
    }
    .companies { grid-template-columns: 1fr; }
    .contact { grid-template-columns: 1fr; gap: 4px 0; }
    .contact dd { margin-bottom: 18px; }
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <script type="text/babel">
    const TWEAKS = /*EDITMODE-BEGIN*/{
      "greyBg": "#3d4046",
      "greyLine": "#52555c",
      "navy": "#18243f",
      "navyLine": "#2d3a5c",
      "accent": "#e9b464",
      "useAccent": true,
      "serif": "Fraunces",
      "density": "regular",
      "radius": 14
    }/*EDITMODE-END*/;

    const SERIF_STACKS = {
      "Fraunces": "'Fraunces', Georgia, serif",
      "Source Serif 4": "'Source Serif 4', Georgia, serif",
      "Georgia": "Georgia, 'Times New Roman', serif"
    };

    function hexToRgb(hex) {
      const m = hex.replace('#','');
      const n = m.length === 3
        ? m.split('').map(c => c+c).join('')
        : m;
      const num = parseInt(n, 16);
      return [num>>16 & 255, num>>8 & 255, num & 255];
    }
    function mix(hex, pct) {                 // lighten toward white by pct 0-1
      const [r,g,b] = hexToRgb(hex);
      const lerp = (c) => Math.round(c + (255-c)*pct);
      return `rgb(${lerp(r)}, ${lerp(g)}, ${lerp(b)})`;
    }
    function darken(hex, pct) {
      const [r,g,b] = hexToRgb(hex);
      const lerp = (c) => Math.round(c * (1-pct));
      return `rgb(${lerp(r)}, ${lerp(g)}, ${lerp(b)})`;
    }

    function App() {
      const [t, setTweak] = useTweaks(TWEAKS);

      // Apply CSS variables + body density class based on tweaks.
      React.useEffect(() => {
        const root = document.documentElement;
        const accent = t.useAccent ? t.accent : '#c9cfda';     // muted silver when accent off
        root.style.setProperty('--grey-bg',   t.greyBg);
        root.style.setProperty('--grey-bg-2', darken(t.greyBg, 0.15));
        root.style.setProperty('--grey-line', t.greyLine);
        root.style.setProperty('--navy',      t.navy);
        root.style.setProperty('--navy-2',    mix(t.navy, 0.05));
        root.style.setProperty('--navy-line', t.navyLine);
        root.style.setProperty('--ink',       '#e9ecf2');
        root.style.setProperty('--ink-dim',   '#a9b0be');
        root.style.setProperty('--ink-quiet', '#7d8494');
        root.style.setProperty('--accent',    accent);
        root.style.setProperty('--accent-quiet', darken(accent, 0.25));
        root.style.setProperty('--radius',    t.radius + 'px');
        root.style.setProperty('--pad',       'clamp(20px, 3.2vw, 36px)');
        root.style.setProperty('--serif',     SERIF_STACKS[t.serif] || SERIF_STACKS.Fraunces);

        document.body.classList.remove('density-compact','density-regular','density-comfy');
        document.body.classList.add('density-' + t.density);
      }, [t]);

      return (
        <>

              <div>Est. 2018 · 8+ yrs in service</div>

                <p className="lede">
                  Two decades in EMS and the fire service, two decades in sales — now bridging both worlds to get the right tools into responders' hands.
                </p>
                <div className="hero-cta">
                  <a className="btn btn-primary" href="https://bookings.cloud.microsoft/bookwithme/user/8069978f4c7245698f975c84107de687%40batt3.com?anonymous&ismsaljsauthenabled=true" target="_blank" rel="noopener">
                    Schedule a call <b>BATT3</b>
                    <span className="arrow">↗</span>
                  </a>
                  <a className="btn btn-secondary" href="https://calendar.proton.me/bookings#6wHNZZtAKaxrvuhW0MArWVXlEilzm9AGMUtPjH6mXsQ=" target="_blank" rel="noopener">
                    Schedule a call <b>FireTek</b>
                    <span className="arrow">↗</span>
                  </a>
                </div>
              </div>
              <aside className="hero-aside">
                <b>Based</b>United States
                <br /><br />
                <b>Focus</b>Public Safety SaaS
                <br /><br />
                <b>Sector</b>Fire · EMS
              </aside>
            </section>

            {/* ABOUT */}
            <div className="section-label">
              <span className="num">01</span>
              <span>About</span>
              <span className="rule"></span>
            </div>

            <article className="card about">
              <div>
                <p>
                  With more than 20 years in EMS and the fire service, David brings a deep frontline perspective to the SaaS public safety sector.
                </p>
                <p>
                  His career spans roles as a career EMT, Haz-Mat Technician, Swift water rescue technician, volunteer firefighter, and search and rescue responder. Before stepping into public safety, he spent an equal two decades in sales — <em>a combination that now shapes how he works with agencies</em>, understanding both the operational realities of the job and the business side of getting the right tools into responders' hands.
                </p>
              </div>
              <aside className="creds">
                <h4>Frontline Experience</h4>
                <ul>
                  <li>Career EMT<span>20+ yrs</span></li>
                  <li>Haz-Mat Technician<span>Cert.</span></li>
                  <li>Swift Water Rescue<span>Cert.</span></li>
                  <li>Volunteer Firefighter<span>Retired</span></li>
                  <li>Search &amp; Rescue<span>Retired</span></li>
                  <li>Sales &amp; Account Mgmt<span>20+ yrs</span></li>
                </ul>
              </aside>
            </article>

            {/* COMPANIES */}
            <div className="section-label">
              <span className="num">02</span>
              <span>Where I Work</span>
              <span className="rule"></span>
            </div>

            <div className="companies">

              <article className="card company">
                <header className="company-head">

                  <div className="role"><b>Account Manager</b>Public Safety Solutions</div>

                  <a href="https://www.batt3.com" target="_blank" rel="noopener">
                    batt3.com <span className="arrow">↗</span>
                  </a>
                  <a className="email" href="mailto:dlynch@batt3.com">dlynch@batt3.com</a>
                </footer>
              </article>

              <article className="card company">
                <header className="company-head">
                  <div className="logo">Fire<span className="mark">Tek</span></div>
                  <div className="role"><b>Account Manager</b>Real-time Response</div>

                <p className="company-desc">
                  <strong>FireTek</strong> is a real-time alerting and mapping platform purpose-built for fire departments and EMS. From dispatch to arrival, it delivers instant alerts, live location tracking, and hoselay mapping to the nearest water source — showing who's en route with accurate maps, property data, and true routing. Designed by firefighters, for firefighters.

                <div className="products">
                  <span className="pill">Alerts</span>

                <footer className="company-foot">
                  <a href="https://www.firetek.io" target="_blank" rel="noopener">
                    firetek.io <span className="arrow">↗</span>

            </div>

            {/* CONTACT — split into two, aligned under each company */}
            <div className="section-label">
              <span className="num">03</span>
              <span>Get in Touch</span>
              <span className="rule"></span>
            </div>

            <div className="companies contact-grid">

              <article className="card contact-card">
                <header className="contact-head">
                  <div className="logo">BATT<span className="mark">3</span></div>
                  <div className="role"><b>Direct Line</b>Account Management</div>
                </header>
                <dl className="contact">
                  <dt>Email</dt>
